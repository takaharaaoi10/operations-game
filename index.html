<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Operations - Math Puzzle Game</title>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    @keyframes confetti {
      0% { transform: translateY(-10px) rotate(0deg); opacity: 1; }
      100% { transform: translateY(100vh) rotate(720deg); opacity: 0; }
    }
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }
    @keyframes scaleIn {
      from { transform: scale(0.8); opacity: 0; }
      to { transform: scale(1); opacity: 1; }
    }
    @keyframes bounce-slow {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-10px); }
    }
    @keyframes shake {
      0%, 100% { transform: translateX(0); }
      25% { transform: translateX(-10px); }
      75% { transform: translateX(10px); }
    }
    .animate-confetti { animation: confetti linear forwards; }
    .animate-fadeIn { animation: fadeIn 0.5s ease-out; }
    .animate-scaleIn { animation: scaleIn 0.5s ease-out; }
    .animate-bounce-slow { animation: bounce-slow 2s ease-in-out infinite; }
    .animate-shake { animation: shake 0.5s ease-in-out; }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect } = React;

    const DEMO_LEVEL_COUNT = 2;
    const randomInt = (min, max) => Math.floor(Math.random() * (max - min + 1)) + min;

    const calculateResult = (a, b, op) => {
      switch (op) {
        case '+':
          return a + b;
        case '-':
          return a - b;
        case '×':
          return a * b;
        case '÷':
          if (b === 0) return null;
          return a / b;
        default:
          return null;
      }
    };

    const getDivisors = (value) => {
      if (!Number.isInteger(value)) return [];
      const divisors = [];

      for (let candidate = 2; candidate <= Math.abs(value); candidate += 1) {
        if (value % candidate === 0) {
          divisors.push(candidate);
        }
      }

      return divisors;
    };

    const buildGeneratedLevel = (levelNum) => {
      const stepCount = Math.min(2 + levelNum, 5);
      const numbers = [randomInt(2, 9)];
      const ops = [];
      let currentValue = numbers[0];

      for (let step = 0; step < stepCount; step += 1) {
        const validOps = ['+', '×'];

        if (currentValue > 3) {
          validOps.push('-');
        }

        if (getDivisors(currentValue).length > 0) {
          validOps.push('÷');
        }

        const chosenOp = validOps[randomInt(0, validOps.length - 1)];
        let nextNumber = 2;

        if (chosenOp === '+') {
          nextNumber = randomInt(1, 10);
        }

        if (chosenOp === '-') {
          nextNumber = randomInt(1, currentValue - 1);
        }

        if (chosenOp === '×') {
          nextNumber = randomInt(2, 5);
        }

        if (chosenOp === '÷') {
          const divisors = getDivisors(currentValue);
          nextNumber = divisors[randomInt(0, divisors.length - 1)];
        }

        const result = calculateResult(currentValue, nextNumber, chosenOp);

        ops.push(chosenOp);
        numbers.push(nextNumber);
        currentValue = result;
      }

      return {
        target: currentValue,
        ops,
        numbers
      };
    };

    const Confetti = () => {
      return (
        <div className="fixed inset-0 pointer-events-none z-50">
          {[...Array(50)].map((_, i) => (
            <div
              key={i}
              className="absolute animate-confetti"
              style={{
                left: `${Math.random() * 100}%`,
                top: '-10px',
                width: '10px',
                height: '10px',
                backgroundColor: ['#fbbf24', '#ef4444', '#10b981', '#3b82f6', '#8b5cf6'][Math.floor(Math.random() * 5)],
                animationDelay: `${Math.random() * 3}s`,
                animationDuration: `${3 + Math.random() * 2}s`
              }}
            />
          ))}
        </div>
      );
    };

    const OperationsGame = () => {
      const [gameState, setGameState] = useState('menu');
      const [level, setLevel] = useState(1);
      const [targetNumber, setTargetNumber] = useState(0);
      const [operations, setOperations] = useState([]);
      const [numberBank, setNumberBank] = useState([]);
      const [selectedNumbers, setSelectedNumbers] = useState([]);
      const [selectedOperation, setSelectedOperation] = useState(null);
      const [currentOpIndex, setCurrentOpIndex] = useState(0);
      const [completedSteps, setCompletedSteps] = useState([]);
      const [score, setScore] = useState(0);
      const [startTime, setStartTime] = useState(null);
      const [elapsedTime, setElapsedTime] = useState(0);
      const [showConfetti, setShowConfetti] = useState(false);
      const [shake, setShake] = useState(false);
      const [statusMessage, setStatusMessage] = useState('');
      const [bestScore, setBestScore] = useState(0);
      const [playedLevels, setPlayedLevels] = useState({});
      const [shareMessage, setShareMessage] = useState('');

      useEffect(() => {
        if (gameState === 'playing' && startTime) {
          const interval = setInterval(() => {
            setElapsedTime(Math.floor((Date.now() - startTime) / 1000));
          }, 100);
          return () => clearInterval(interval);
        }
      }, [gameState, startTime]);

      const generateLevel = (levelNum) => {
        const configs = [
          { target: 10, ops: ['+', '+'], numbers: [3, 5, 2] },
          { target: 28, ops: ['+', '×'], numbers: [2, 5, 4] },
        ];

        if (levelNum <= configs.length) {
          return configs[levelNum - 1];
        }

        return buildGeneratedLevel(levelNum);
      };

      const startLevel = (levelNum) => {
        if (playedLevels[levelNum]) {
          setStatusMessage(`Level ${levelNum} has already been played this refresh.`);
          setGameState('menu');
          return;
        }

        const config = generateLevel(levelNum);
        setLevel(levelNum);
        setTargetNumber(config.target);
        setOperations(config.ops);
        setNumberBank(config.numbers);
        setSelectedNumbers([]);
        setSelectedOperation(null);
        setCurrentOpIndex(0);
        setCompletedSteps([]);
        setGameState('playing');
        setStartTime(Date.now());
        setElapsedTime(0);
        setShowConfetti(false);
        setShareMessage('');
        setPlayedLevels((currentLevels) => ({ ...currentLevels, [levelNum]: true }));
        setStatusMessage(`Level ${levelNum}: reach ${config.target}. Tap a selected tile again to deselect it.`);
      };

      const selectNumber = (num, index) => {
        if (selectedNumbers.length >= 2) return;
        if (selectedNumbers.some(s => s.index === index)) {
          setSelectedNumbers(selectedNumbers.filter(s => s.index !== index));
        } else {
          setSelectedNumbers([...selectedNumbers, { value: num, index }]);
        }
      };

      const selectOperationFromBank = (op) => {
        if (selectedOperation === op) {
          setSelectedOperation(null);
        } else {
          setSelectedOperation(op);
        }
      };

      const performOperation = () => {
        if (selectedNumbers.length !== 2 || !selectedOperation) return;
        
        if (selectedOperation !== operations[currentOpIndex]) {
          setShake(true);
          setStatusMessage('That move does not work for this round.');
          setTimeout(() => setShake(false), 500);
          return;
        }
        
        const a = selectedNumbers[0].value;
        const b = selectedNumbers[1].value;
        const result = calculateResult(a, b, selectedOperation);

        if (result === null || !Number.isFinite(result)) {
          setShake(true);
          setStatusMessage('That move does not produce a valid number. Try a different pair.');
          setTimeout(() => setShake(false), 500);
          return;
        }
        
        const roundedResult = Math.round(result * 100) / 100;

        setCompletedSteps([...completedSteps, { a, b, op: selectedOperation, result: roundedResult, step: currentOpIndex + 1 }]);

        const newBank = numberBank.filter((_, i) => 
          i !== selectedNumbers[0].index && i !== selectedNumbers[1].index
        );
        newBank.push(roundedResult);

        setNumberBank(newBank);
        setSelectedNumbers([]);
        setSelectedOperation(null);
        setCurrentOpIndex(currentOpIndex + 1);
        setStatusMessage('Move locked in.');

        if (newBank.length === 1) {
          const finalResult = newBank[0];
          if (Math.abs(finalResult - targetNumber) < 0.01) {
            const timeBonus = Math.max(0, 300 - elapsedTime);
            const levelBonus = level * 100;
            const newScore = score + timeBonus + levelBonus;
            setScore(newScore);
            setBestScore((currentBest) => Math.max(currentBest, newScore));
            setShowConfetti(true);
            setTimeout(() => setGameState('won'), 500);
          } else {
            setStatusMessage(`Final number ${finalResult} did not match the target ${targetNumber}.`);
            setGameState('lost');
          }
        }
      };

      const nextLevel = () => {
        if (level >= DEMO_LEVEL_COUNT) {
          setGameState('menu');
          setStatusMessage('Thanks for testing the two-level build.');
          return;
        }

        startLevel(level + 1);
      };

      const formatTime = (seconds) => {
        const mins = Math.floor(seconds / 60);
        const secs = seconds % 60;
        return `${mins}:${secs.toString().padStart(2, '0')}`;
      };

      const buildShareText = () => {
        const seconds = Math.max(1, elapsedTime);
        return `I just played Operations in under ${seconds} seconds! Try to beat my score: https://dailytrojan-online.github.io/operations-game/`;
      };

      const shareResults = async () => {
        const text = buildShareText();

        try {
          if (navigator.share) {
            await navigator.share({
              title: 'Operations',
              text,
              url: window.location.href
            });
            setShareMessage('Shared!');
            return;
          }

          if (navigator.clipboard && navigator.clipboard.writeText) {
            await navigator.clipboard.writeText(text);
            setShareMessage('Results copied. Send them to a friend.');
            return;
          }
        } catch (error) {
          setShareMessage('Sharing was canceled.');
          return;
        }

        setShareMessage('Sharing is not available on this device.');
      };

      const renderLevelCard = (levelNum) => {
        const hasPlayed = !!playedLevels[levelNum];
        const isUnlocked = levelNum === 1 || !!playedLevels[levelNum - 1];

        return (
          <div key={levelNum} className="bg-red-800 text-yellow-200 rounded-xl p-4 shadow-lg">
            <div className="flex items-center justify-between mb-3">
              <div>
                <div className="text-xl font-bold">Level {levelNum}</div>
                <div className="text-sm">Played: {hasPlayed ? 'Yes' : 'No'}</div>
              </div>
              <div className={`px-3 py-1 rounded-full text-xs font-bold ${hasPlayed ? 'bg-black text-yellow-300' : 'bg-yellow-400 text-black'}`}>
                {hasPlayed ? 'Closed' : 'Open'}
              </div>
            </div>
            <button
              onClick={() => startLevel(levelNum)}
              disabled={!isUnlocked || hasPlayed}
              className="w-full bg-yellow-400 text-red-900 py-3 px-4 rounded-lg font-bold disabled:opacity-50 disabled:cursor-not-allowed"
            >
              {!isUnlocked ? 'Locked' : hasPlayed ? 'Already Played' : 'Play Round'}
            </button>
          </div>
        );
      };

      if (gameState === 'menu') {
        return (
          <div className="min-h-screen bg-red-900 flex items-center justify-center p-4">
            <div className="w-full max-w-md animate-fadeIn">
              <div className="mb-8 text-center">
                <h1 className="text-7xl md:text-8xl font-bold text-yellow-400 mb-4 animate-bounce-slow">
                  Operations
                </h1>
                <p className="text-yellow-200 text-lg">A Strategic Math Puzzle Game</p>
              </div>
              
              <div className="bg-yellow-400 p-8 rounded-2xl shadow-2xl transform hover:scale-105 transition-transform">
                <div className="mb-6">
                  <h2 className="text-2xl font-bold text-black mb-4 text-center">How to Play</h2>
                  <ul className="text-black text-left space-y-2 text-sm">
                    <li>🎯 Reach the target number</li>
                    <li>🔢 Select 2 numbers from the bank</li>
                    <li>➕ Tap an operation, then calculate</li>
                    <li>🔁 Tap again to deselect a number or operation</li>
                    <li>🚫 Each level can only be played once per refresh</li>
                  </ul>
                </div>

                <div className="space-y-3">
                  {[1, 2].map(renderLevelCard)}
                </div>
                
                {bestScore > 0 && (
                  <div className="mt-4 text-center text-black font-bold">
                    🏆 Best Score: {bestScore}
                  </div>
                )}
                {statusMessage && (
                  <div className="mt-4 text-center text-black text-sm font-semibold">
                    {statusMessage}
                  </div>
                )}
                {shareMessage && (
                  <div className="mt-2 text-center text-black text-sm">
                    {shareMessage}
                  </div>
                )}
              </div>
            </div>
          </div>
        );
      }

      if (gameState === 'won') {
        return (
          <div className="min-h-screen bg-red-900 flex items-center justify-center p-4 relative overflow-hidden">
            {showConfetti && <Confetti />}
            <div className="w-full max-w-md animate-fadeIn">
              <h1 className="text-6xl font-bold text-yellow-400 text-center mb-8 animate-pulse">
                Operations
              </h1>
              
              <div className="bg-yellow-400 p-12 rounded-2xl text-center shadow-2xl transform animate-scaleIn">
                <div className="text-7xl mb-6 animate-bounce">🎉</div>
                <h2 className="text-6xl font-bold text-black mb-4 animate-pulse">
                  YOU WIN!!!
                </h2>
                
                <div className="bg-red-800 text-yellow-400 p-4 rounded-lg mb-6">
                  <div className="text-sm mb-1">Level {level} Complete</div>
                  <div className="text-3xl font-bold">Score: {score}</div>
                  <div className="text-sm mt-1">Time: {formatTime(elapsedTime)}</div>
                </div>
                
                <div className="space-y-3">
                  {level < DEMO_LEVEL_COUNT && !playedLevels[level + 1] && (
                    <button
                      onClick={nextLevel}
                      className="w-full bg-red-800 text-yellow-400 py-4 px-8 rounded-xl font-bold text-xl hover:bg-red-700 transition-all transform hover:scale-105 shadow-lg"
                    >
                      Next Level →
                    </button>
                  )}
                  <button
                    onClick={shareResults}
                    className="w-full bg-red-800 text-yellow-400 py-4 px-8 rounded-xl font-bold text-xl hover:bg-red-700 transition-all transform hover:scale-105 shadow-lg"
                  >
                    Share Your Results
                  </button>
                  <button
                    onClick={() => setGameState('menu')}
                    className="w-full bg-black text-yellow-400 py-3 px-8 rounded-xl font-semibold text-lg hover:bg-gray-900 transition-all"
                  >
                    Main Menu
                  </button>
                </div>
                {shareMessage && (
                  <div className="mt-4 text-sm font-semibold text-black">{shareMessage}</div>
                )}
              </div>
            </div>
          </div>
        );
      }

      if (gameState === 'lost') {
        return (
          <div className="min-h-screen bg-red-900 flex items-center justify-center p-4">
            <div className="w-full max-w-md animate-fadeIn">
              <h1 className="text-6xl font-bold text-yellow-400 text-center mb-8">
                Operations
              </h1>
              
              <div className="bg-yellow-400 p-12 rounded-2xl text-center shadow-2xl">
                <div className="text-7xl mb-6">😢</div>
                <h2 className="text-5xl font-bold text-black mb-4">
                  So Close!
                </h2>
                <div className="text-black mb-6">
                  <p className="text-xl">Target: <span className="font-bold">{targetNumber}</span></p>
                  <p className="text-xl">You got: <span className="font-bold">{numberBank[0]}</span></p>
                  <p className="text-sm mt-2">This round is locked until refresh.</p>
                </div>
                
                <div className="space-y-3">
                  <button
                    onClick={shareResults}
                    className="w-full bg-red-800 text-yellow-400 py-4 px-8 rounded-xl font-bold text-xl hover:bg-red-700 transition-all transform hover:scale-105 shadow-lg"
                  >
                    Send To Friend
                  </button>
                  <button
                    onClick={() => setGameState('menu')}
                    className="w-full bg-black text-yellow-400 py-3 px-8 rounded-xl font-semibold text-lg hover:bg-gray-900 transition-all"
                  >
                    Main Menu
                  </button>
                </div>
                {shareMessage && (
                  <div className="mt-4 text-sm font-semibold text-black">{shareMessage}</div>
                )}
              </div>
            </div>
          </div>
        );
      }

      return (
        <div className="min-h-screen bg-red-900 p-2 md:p-8">
          <div className="max-w-3xl mx-auto">
            <div className="flex justify-between items-center mb-4 md:mb-6 px-2">
              <h1 className="text-4xl md:text-6xl font-bold text-yellow-400">
                Operations
              </h1>
              <div className="flex gap-3 md:gap-6 items-center">
                <div className="bg-yellow-400 px-3 md:px-4 py-2 rounded-lg">
                  <div className="text-xs text-black">Level</div>
                  <div className="text-xl md:text-2xl font-bold text-black">{level}</div>
                </div>
                <div className="bg-yellow-400 px-3 md:px-4 py-2 rounded-lg">
                  <div className="text-xs text-black">Time</div>
                  <div className="text-xl md:text-2xl font-bold text-black font-mono">{formatTime(elapsedTime)}</div>
                </div>
                <div className="bg-yellow-400 px-3 md:px-4 py-2 rounded-lg">
                  <div className="text-xs text-black">Score</div>
                  <div className="text-xl md:text-2xl font-bold text-black">{score}</div>
                </div>
                <div className="bg-yellow-400 px-3 md:px-4 py-2 rounded-lg">
                  <div className="text-xs text-black">Played</div>
                  <div className="text-xl md:text-2xl font-bold text-black">{playedLevels[level] ? 'Yes' : 'No'}</div>
                </div>
              </div>
            </div>

            <div className={`bg-red-800 p-3 md:p-6 rounded-2xl border-4 md:border-8 border-red-900 shadow-2xl ${shake ? 'animate-shake' : ''}`}>
              <div className="bg-gradient-to-br from-gray-100 to-gray-200 py-4 md:py-6 px-4 mb-3 md:mb-4 text-center rounded-xl shadow-lg transform hover:scale-105 transition-transform">
                <h2 className="text-xl md:text-2xl font-bold text-black mb-1">🎯 Target Number</h2>
                <div className="text-5xl md:text-6xl font-bold text-red-800">{targetNumber}</div>
              </div>

              <div className="space-y-2 md:space-y-3 mb-3 md:mb-4">
                {operations.map((op, idx) => {
                  const isCompleted = idx < completedSteps.length;
                  const stepInfo = completedSteps.find(s => s.step === idx + 1);
                  
                  return (
                    <div
                      key={idx}
                      className={`py-3 md:py-4 px-4 md:px-6 text-center font-bold text-base md:text-lg rounded-lg shadow-md transition-all duration-300 ${
                        isCompleted 
                          ? 'bg-green-500 text-white transform scale-105' 
                          : 'bg-gray-200 text-gray-600'
                      }`}
                    >
                      {isCompleted && stepInfo ? (
                        <span>{stepInfo.a} {stepInfo.op} {stepInfo.b} = {stepInfo.result} ✓</span>
                      ) : (
                        <span>Step {idx + 1}</span>
                      )}
                    </div>
                  );
                })}
              </div>

              <div className="bg-yellow-400 text-black font-semibold text-center rounded-xl px-4 py-3 mb-3 md:mb-4 min-h-[52px] flex items-center justify-center">
                {statusMessage}
              </div>

              <div className="bg-gray-300 p-3 md:p-4 rounded-xl">
                <h3 className="text-center font-bold text-black mb-2 md:mb-3 text-base md:text-lg">🎲 Banks</h3>
                
                <div className="grid grid-cols-1 md:grid-cols-2 gap-3 md:gap-4">
                  <div className="bg-gray-600 p-3 md:p-4 rounded-lg shadow-lg">
                    <h4 className="text-center font-bold text-white mb-2 md:mb-3 text-sm md:text-base">Number Bank</h4>
                    <div className="grid grid-cols-3 gap-1.5 md:gap-2">
                      {numberBank.map((num, idx) => {
                        const isSelected = selectedNumbers.some(s => s.index === idx);
                        return (
                          <button
                            key={idx}
                            onClick={() => selectNumber(num, idx)}
                            disabled={selectedNumbers.length >= 2 && !isSelected}
                            className={`aspect-square flex items-center justify-center text-xl md:text-2xl font-bold rounded-lg transition-all transform ${
                              isSelected
                                ? 'bg-yellow-400 text-black scale-110 shadow-lg ring-4 ring-yellow-300'
                                : 'bg-gray-700 text-white hover:bg-gray-600 hover:scale-105'
                            } disabled:opacity-30 disabled:cursor-not-allowed shadow-md`}
                          >
                            {num}
                          </button>
                        );
                      })}
                    </div>
                  </div>

                  <div className="bg-gray-700 p-3 md:p-4 rounded-lg shadow-lg">
                    <h4 className="text-center font-bold text-white mb-2 md:mb-3 text-sm md:text-base">Operations Bank</h4>
                    <div className="space-y-1.5 md:space-y-2">
                      {['+', '-', '×', '÷'].map((op) => {
                        const isSelected = selectedOperation === op;
                        return (
                          <button
                            key={op}
                            onClick={() => selectOperationFromBank(op)}
                            className={`w-full py-2.5 md:py-3 text-2xl md:text-3xl font-bold rounded-lg transition-all transform ${
                              isSelected
                                ? 'bg-yellow-400 text-black scale-105 shadow-lg ring-4 ring-yellow-300'
                                : 'bg-gray-800 text-white hover:bg-gray-700 hover:scale-105'
                            } shadow-md`}
                          >
                            {op}
                          </button>
                        );
                      })}
                    </div>
                  </div>
                </div>

                {selectedNumbers.length === 2 && selectedOperation && (
                  <div className="mt-4 md:mt-6 text-center animate-fadeIn">
                    <div className="bg-white text-black text-lg md:text-2xl font-bold mb-3 py-2 md:py-3 px-4 rounded-lg shadow-lg">
                      {selectedNumbers[0].value} {selectedOperation} {selectedNumbers[1].value} = ?
                    </div>
                    <button
                      onClick={performOperation}
                      className="bg-green-600 text-white px-6 md:px-10 py-3 md:py-4 rounded-xl font-bold text-lg md:text-xl hover:bg-green-500 transition-all transform hover:scale-110 shadow-xl animate-pulse"
                    >
                      ✓ Calculate
                    </button>
                  </div>
                )}
                
                {selectedNumbers.length === 0 && !selectedOperation && (
                  <div className="mt-4 text-center text-gray-600 text-xs md:text-sm">
                    Select 2 numbers and one operation. Tap again to deselect.
                  </div>
                )}
              </div>
            </div>
          </div>
        </div>
      );
    };

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<OperationsGame />);
  </script>
</body>
</html>
